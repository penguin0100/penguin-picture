spring:
  application:
    name: penguin-picture
  profiles:
    active: local
  # 开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.example.penguinpicture.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

